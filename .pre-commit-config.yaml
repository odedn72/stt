# Pre-commit hooks for SystemSTT.
#
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# These hooks run automatically on every commit to catch issues early.
# The CI pipeline runs the same checks, so this is a local safety net.

default_language_version:
  python: python3.11

repos:
  # -------------------------------------------------------------------------
  # General file hygiene
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: debug-statements
      - id: check-ast

  # -------------------------------------------------------------------------
  # Ruff — linting + formatting (replaces black, isort, flake8)
  # -------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      # Lint
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      # Format
      - id: ruff-format
        types_or: [python, pyi]

  # -------------------------------------------------------------------------
  # Mypy — strict type checking
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--strict]
        # mypy needs access to the project's dependencies for type stubs.
        # List the ones mypy needs to resolve imports.
        additional_dependencies:
          - pydantic>=2.5
          - PySide6>=6.6
          - numpy>=1.24
          - types-setuptools
        pass_filenames: false
        # Only run on src/ to avoid checking test files (which may use
        # looser typing conventions for mocks and fixtures).
        entry: mypy src/systemstt
